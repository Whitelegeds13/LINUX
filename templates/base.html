<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blockchain URP{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f3460;
        }
        
        .navbar h1 {
            font-size: 1.5rem;
            color: #00d9ff;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .nav-links a:hover {
            background: #0f3460;
            color: #00d9ff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            color: #00d9ff;
            margin-bottom: 1rem;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 0.5rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #00d9ff;
            font-size: 2rem;
        }
        
        .stat-card p {
            color: #aaa;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        
        th {
            color: #00d9ff;
            font-weight: bold;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
        }
        
        input, select {
            padding: 0.75rem;
            border-radius: 5px;
            border: 1px solid #0f3460;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00d9ff;
        }
        
        button, .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: #00d9ff;
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            background: #00b8d4;
        }
        
        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #1a4a7a;
        }
        
        .messages {
            margin-bottom: 1rem;
        }
        
        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }
        
        .message.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
        }
        
        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
        }
        
        .hero {
            text-align: center;
            padding: 3rem 0;
        }
        
        .hero h1 {
            font-size: 3rem;
            color: #00d9ff;
            margin-bottom: 1rem;
        }
        
        .hero p {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 2rem;
        }
        
        .block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #00d9ff;
        }
        
        .block h3 {
            color: #00d9ff;
            margin-bottom: 0.5rem;
        }
        
        .block .hash {
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
            word-break: break-all;
        }
        
        .token-badge {
            background: linear-gradient(135deg, #00d9ff 0%, #00b8d4 100%);
            color: #1a1a2e;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .barcode-display {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem;
            border-radius: 3px;
            color: #00ff00;
            letter-spacing: 2px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <h1>Blockchain URP</h1>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="{% url 'students' %}">Estudiantes</a>
            <a href="{% url 'courses' %}">Cursos</a>
            <a href="{% url 'attendance' %}">Asistencia</a>
            <a href="{% url 'process_attendance' %}">Procesar Tokens</a>
            <a href="{% url 'catalog' %}">Catalogo</a>
            <a href="{% url 'token_rewards' %}">Tokens</a>
            <a href="{% url 'blockchain_view' %}">Blockchain</a>
        </div>
    </nav>
    
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
