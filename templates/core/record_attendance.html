{% extends 'base.html' %}

{% block title %}Registrar Asistencia - Blockchain URP{% endblock %}

{% block content %}
<div class="card">
    <h2>Registrar Asistencia</h2>
    <form method="post">
        {% csrf_token %}
        <label>Estudiante:</label>
        <select name="student_id" required>
            <option value="">Seleccionar estudiante</option>
            {% for student in students %}
            <option value="{{ student.student_id }}">{{ student.name }} {{ student.lastname }} ({{ student.student_id }})</option>
            {% endfor %}
        </select>
        
        <label>Curso:</label>
        <select name="course_id" required>
            <option value="">Seleccionar curso</option>
            {% for course in courses %}
            <option value="{{ course.course_id }}">{{ course.course_name }} ({{ course.course_code }})</option>
            {% endfor %}
        </select>
        
        <label>Fecha:</label>
        <input type="date" name="attendance_date" required>
        
        <label>
            <input type="checkbox" name="present" checked> Asistio
        </label>
        
        <button type="submit" class="btn btn-primary">Registrar</button>
        <a href="{% url 'attendance' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
